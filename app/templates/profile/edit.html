{% extends "base.html" %}
{% block title %}Edit Profile – Research Hub{% endblock %}
{% block extra_css %}
<style>
.app{
  display:flex;
  min-height:100vh;
  background:
    radial-gradient(1100px 540px at 92% -5%, rgba(56,173,248,0.18), transparent 65%),
    radial-gradient(960px 520px at -8% 10%, rgba(2,91,160,0.16), transparent 60%),
    linear-gradient(160deg, #ecf4ff 0%, #f3f8ff 50%, #eaf3ff 100%)
}
html[data-theme="dark"] .app{
  background:
    radial-gradient(1100px 540px at 92% -5%, rgba(56,173,248,0.16), transparent 65%),
    radial-gradient(960px 520px at -8% 10%, rgba(2,91,160,0.22), transparent 60%),
    linear-gradient(160deg, #0c1017 0%, #101722 52%, #141e2c 100%)
}
.sidebar{width:252px;flex-shrink:0;background:linear-gradient(180deg,#0b3d6a 0%,#025ba0 48%,#0272c6 100%);border-right:1px solid rgba(255,255,255,0.22);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:50;box-shadow:12px 0 36px rgba(2,91,160,0.20)}
html[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#10161f 0%,#141c28 52%,#192536 100%);border-right-color:rgba(124,200,251,0.24);box-shadow:14px 0 42px rgba(0,0,0,0.42)}
.sidebar-brand{display:flex;align-items:center;gap:10px;padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.22)}
.sb-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(140deg,#7cc8fb,#38adf8);display:flex;align-items:center;justify-content:center;font-size:15px;color:#0b3d6a;box-shadow:0 8px 20px rgba(0,0,0,0.2)}
.sb-name{font-family:var(--font-serif);font-size:1.08rem;color:#f5fbff}
.sb-nav-section{padding:18px 12px 4px}
.sb-section-title{font-size:.68rem;font-weight:700;color:rgba(218,238,255,0.78);text-transform:uppercase;letter-spacing:.09em;padding:0 8px;margin-bottom:6px}
.sb-nav{display:flex;flex-direction:column;gap:3px}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r);font-size:.87rem;font-weight:500;color:rgba(230,245,255,0.9);transition:all .18s;text-decoration:none}
.sidebar-link:hover{background:rgba(255,255,255,0.12);color:#fff}
.sidebar-link.active{background:linear-gradient(135deg,rgba(56,173,248,0.32),rgba(124,200,251,0.24));color:#fff;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.28)}
.sl-icon{width:30px;height:30px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(255,255,255,0.08)}
.sidebar-link.active .sl-icon{background:rgba(255,255,255,0.24)}
.sb-user{padding:14px 16px;margin:10px 12px 6px;border:1px solid rgba(255,255,255,0.24);border-radius:12px;background:rgba(255,255,255,0.08)}
.sb-user-inner{display:flex;align-items:center;gap:10px}
.sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#7cc8fb,#38adf8);color:#0b3d6a;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-user-name{font-size:.84rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.74rem;color:rgba(220,240,255,0.82);text-transform:capitalize}
.sb-footer{margin-top:auto;padding:12px;border-top:1px solid rgba(255,255,255,0.22)}
.sb-logout-btn{width:100%;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:10px;border:1px solid rgba(255,255,255,0.28);background:rgba(0,0,0,0.20);color:#f8fbff;font-size:.84rem;font-weight:600;text-decoration:none;transition:all .18s}
.sb-logout-btn:hover{background:rgba(239,68,68,0.22);border-color:rgba(252,165,165,0.55)}
.main{margin-left:252px;flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:40}
.topbar-title{font-size:.95rem;font-weight:600;color:var(--text-1)}
.topbar-subtitle{font-size:.75rem;color:var(--text-3)}
.topbar-right{display:flex;align-items:center;gap:10px}
.tb-theme-btn{width:34px;height:34px;border-radius:var(--r);border:1.5px solid var(--border-md);background:var(--surface-muted);color:var(--text-2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.tb-theme-btn .t-moon{display:block}.tb-theme-btn .t-sun{display:none}
html[data-theme="dark"] .tb-theme-btn .t-moon{display:none}
html[data-theme="dark"] .tb-theme-btn .t-sun{display:block}
.page-body{padding:28px 32px;flex:1;max-width:980px;width:100%;margin:0 auto}
.settings-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:20px;align-items:start}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;max-width:none;margin-bottom:20px}
.form-card-title{font-size:1rem;font-weight:600;color:var(--text-1);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.82rem;font-weight:600;color:var(--text-2);margin-bottom:6px}
.form-input{width:100%;padding:9px 12px;border-radius:var(--r);border:1px solid var(--border-md);background:var(--white);color:var(--text-1);font-size:.855rem;font-family:var(--font-sans);outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:var(--sky-400)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.btn-primary{padding:9px 22px;border-radius:var(--r);background:var(--sky-600);color:#fff;border:none;font-size:.855rem;font-weight:600;cursor:pointer;font-family:var(--font-sans);transition:background .18s}
.btn-primary:hover{background:var(--sky-700)}
.btn-secondary{padding:9px 18px;border-radius:var(--r);background:var(--surface-muted);color:var(--text-2);border:1px solid var(--border-md);font-size:.855rem;font-weight:600;cursor:pointer;font-family:var(--font-sans);text-decoration:none;display:inline-block}
.form-actions{display:flex;gap:10px;margin-top:20px}
.form-card:last-child{margin-bottom:0}
@media(max-width:860px) and (pointer:coarse){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.topbar,.page-body{padding-left:20px;padding-right:20px}}
@media(max-width:920px){.settings-grid{grid-template-columns:1fr}}
</style>
{% endblock %}
{% block content %}
<div class="app">
      {% include "includes/app_sidebar.html" %}
  <div class="main">
    <header class="topbar">
      <div><div class="topbar-title">Edit Profile</div><div class="topbar-subtitle">Update your personal information</div></div>
      <div class="topbar-right"><button class="tb-theme-btn" onclick="toggleTheme()"><span class="t-moon">&#9790;</span><span class="t-sun">&#9728;</span></button></div>
    </header>
    <div class="page-body">
      <div class="settings-grid">
        <!-- Profile Info Form -->
        <div class="form-card">
          <div class="form-card-title">&#128100; Personal Information</div>
          <form method="POST" action="{{ url_for('profile.edit') }}">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">First Name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">Last Name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}" class="form-input" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" value="{{ user.email }}" class="form-input" disabled style="opacity:.6">
            </div>
            <div class="form-group">
              <label class="form-label">Bio</label>
              <textarea name="bio" class="form-input" rows="3" placeholder="Tell us about yourself…">{{ user.bio or '' }}</textarea>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Save Changes</button>
              <a href="{{ url_for('profile.view') }}" class="btn-secondary">Cancel</a>
            </div>
          </form>
        </div>

        <!-- Change Password Form -->
        <div class="form-card">
          <div class="form-card-title">&#128274; Change Password</div>
          <form method="POST" action="{{ url_for('profile.change_password') }}">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input type="password" name="current_password" class="form-input" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" class="form-input" required>
              </div>
              <div class="form-group">
                <label class="form-label">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-input" required>
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="btn-primary">Change Password</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
