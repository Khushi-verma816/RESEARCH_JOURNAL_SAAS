{% extends "base.html" %}
{% block title %}{{ room_name }} – Video Room{% endblock %}
{% block extra_css %}
<style>
body{margin:0;padding:0;background:#1a1a2e;overflow:hidden}
.room-wrap{display:flex;flex-direction:column;height:100vh}

/* Topbar */
.room-topbar{height:52px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:10}
.room-name{font-size:0.95rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.room-live{width:8px;height:8px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.room-code-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px}
.room-code-label{font-size:0.72rem;color:rgba(255,255,255,0.5)}
.room-code-val{font-size:0.82rem;font-weight:700;color:#fff;font-family:monospace}
.copy-code-btn{padding:3px 10px;background:rgba(14,165,233,0.3);border:1px solid rgba(14,165,233,0.5);border-radius:6px;color:#38bdf8;font-size:0.72rem;font-weight:600;cursor:pointer;font-family:var(--font-sans)}
.copy-code-btn:hover{background:rgba(14,165,233,0.5)}
.room-actions{display:flex;align-items:center;gap:8px}
.leave-btn{padding:6px 16px;background:#ef4444;border:none;border-radius:8px;color:#fff;font-size:0.82rem;font-weight:700;cursor:pointer;font-family:var(--font-sans)}
.leave-btn:hover{background:#dc2626}

/* Jitsi frame */
.jitsi-wrap{flex:1;position:relative}
#jitsi-container{width:100%;height:100%}
</style>
{% endblock %}

{% block content %}
<div class="room-wrap">

    <!-- Room Topbar -->
    <div class="room-topbar">
        <div class="room-name">
            <div class="room-live"></div>
            🎥 {{ room_name }}
        </div>
        <div class="room-code-box">
            <div class="room-code-label">Room Code:</div>
            <div class="room-code-val" id="room-code-val">{{ room_code }}</div>
            <button class="copy-code-btn" onclick="copyCode()">Copy</button>
        </div>
        <div class="room-actions">
            <button class="leave-btn" onclick="leaveRoom()">🚪 Leave Room</button>
        </div>
    </div>

    <!-- Jitsi Video -->
    <div class="jitsi-wrap">
        <div id="jitsi-container"></div>
    </div>

</div>

<script src="https://meet.jit.si/external_api.js"></script>
<script>
const roomCode   = "researchhub-{{ room_code }}";
const userName   = "{{ display_name }}";
const roomName   = "{{ room_name }}";

const api = new JitsiMeetExternalAPI("meet.jit.si", {
    roomName: roomCode,
    width: "100%",
    height: "100%",
    parentNode: document.getElementById("jitsi-container"),
    userInfo: {
        displayName: userName,
    },
    configOverwrite: {
        startWithAudioMuted: false,
        startWithVideoMuted: false,
        prejoinPageEnabled: true,
        disableDeepLinking: true,
    },
    interfaceConfigOverwrite: {
        TOOLBAR_BUTTONS: [
            'microphone', 'camera', 'desktop', 'fullscreen',
            'fodeviceselection', 'hangup', 'chat', 'recording',
            'raisehand', 'videoquality', 'tileview', 'download', 'help'
        ],
        SHOW_JITSI_WATERMARK: false,
        SHOW_WATERMARK_FOR_GUESTS: false,
        DEFAULT_REMOTE_DISPLAY_NAME: 'Researcher',
        APP_NAME: 'Research Hub',
    }
});

api.addEventListener('videoConferenceLeft', () => {
    window.location.href = "{{ url_for('video.index') }}";
});

function leaveRoom() {
    if (confirm('Are you sure you want to leave the room?')) {
        api.executeCommand('hangup');
        window.location.href = "{{ url_for('video.index') }}";
    }
}

function copyCode() {
    const code = document.getElementById('room-code-val').textContent;
    navigator.clipboard.writeText(code).then(() => {
        alert('Room code copied! Share it with your team.');
    });
}
</script>
{% endblock %}
