{% extends "base.html" %}
{% block title %}500 - Server Error{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px">
    <div>
        <div style="font-size:4rem;margin-bottom:16px">⚠️</div>
        <h1 style="font-size:2rem;margin-bottom:12px;color:var(--text-1)">Server Error</h1>
        <p style="color:var(--text-3);margin-bottom:28px">Something went wrong on our end. Please try again.</p>
        <a href="/" style="padding:10px 24px;background:var(--sky-600);color:#fff;border-radius:var(--r);font-weight:600">Go Home</a>
    </div>
</div>
{% endblock %}
