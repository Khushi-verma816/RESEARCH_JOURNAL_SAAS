<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Research Hub{% endblock %}</title>

    <!-- Early theme apply — prevents flash -->
    <script>
        (function(){
            var t = localStorage.getItem('rh-theme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════════════
           LIGHT MODE TOKENS
        ═══════════════════════════ */
        :root {
            --white:          #ffffff;
            --off-white:      #f0f4fa;
            --surface:        #ffffff;
            --surface-muted:  #e8eef7;
            --surface-hover:  #dce6f4;

            --sky-50:   #eff8ff;
            --sky-100:  #dbeffe;
            --sky-200:  #b9e0fd;
            --sky-300:  #7cc8fb;
            --sky-400:  #38adf8;
            --sky-500:  #0e91e8;
            --sky-600:  #0272c6;
            --sky-700:  #025ba0;
            --sky-800:  #064e84;
            --sky-900:  #0b3d6a;

            --primary:         var(--sky-600);
            --primary-dark:    var(--sky-700);
            --primary-light:   var(--sky-50);
            --primary-border:  var(--sky-200);

            --text-1: #0c1829;
            --text-2: #2d4562;
            --text-3: #5a7a9a;
            --text-4: #9ab5cc;

            --border:        rgba(14,145,232,0.13);
            --border-md:     rgba(14,145,232,0.24);
            --border-strong: rgba(14,145,232,0.42);

            --shadow-xs: 0 1px 3px rgba(12,24,41,0.07), 0 1px 2px rgba(14,145,232,0.04);
            --shadow-sm: 0 2px 8px rgba(12,24,41,0.09), 0 1px 3px rgba(14,145,232,0.06);
            --shadow-md: 0 4px 16px rgba(12,24,41,0.11), 0 2px 6px rgba(14,145,232,0.07);
            --shadow-lg: 0 8px 32px rgba(12,24,41,0.13), 0 3px 10px rgba(14,145,232,0.08);
            --shadow-xl: 0 20px 56px rgba(12,24,41,0.14), 0 6px 20px rgba(14,145,232,0.10);
            --shadow-blue:    0 4px 18px rgba(14,145,232,0.28);
            --shadow-blue-lg: 0 8px 36px rgba(14,145,232,0.38);

            --green:        #059669;
            --green-bg:     rgba(5,150,105,0.08);
            --green-border: rgba(5,150,105,0.18);
            --amber:        #d97706;
            --amber-bg:     rgba(217,119,6,0.08);
            --amber-border: rgba(217,119,6,0.18);
            --red:          #dc2626;
            --red-bg:       rgba(220,38,38,0.07);
            --red-border:   rgba(220,38,38,0.18);

            --r-xs:   4px;
            --r-sm:   6px;
            --r:      10px;
            --r-lg:   14px;
            --r-xl:   20px;
            --r-2xl:  28px;
            --r-pill: 999px;

            --font-serif: 'Instrument Serif', Georgia, serif;
            --font-sans:  'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono:  'JetBrains Mono', 'Fira Code', monospace;

            --ease:        cubic-bezier(0.4,0,0.2,1);
            --ease-spring: cubic-bezier(0.34,1.56,0.64,1);

            /* Light mode gradient mesh */
            --bg-gradient: 
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(14,145,232,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 70% 50% at 80% 110%, rgba(99,102,241,0.06) 0%, transparent 60%),
                #f0f4fa;
        }

        /* ═══════════════════════════
           DARK MODE TOKENS
        ═══════════════════════════ */
        html[data-theme="dark"] {
            --white:         #11161f;
            --off-white:     #0c1017;
            --surface:       #161d29;
            --surface-muted: #1d2735;
            --surface-hover: #253246;

            --sky-50:  rgba(56,173,248,0.08);
            --sky-100: rgba(56,173,248,0.14);
            --sky-200: rgba(56,173,248,0.25);
            --sky-300: #38adf8;
            --sky-400: #60bcf9;
            --sky-500: #38adf8;
            --sky-600: #38adf8;
            --sky-700: #7cc8fb;

            --primary:        #38adf8;
            --primary-dark:   #60bcf9;
            --primary-light:  rgba(56,173,248,0.10);
            --primary-border: rgba(56,173,248,0.25);

            --text-1: #f2f7ff;
            --text-2: #c7d7ea;
            --text-3: #97aec8;
            --text-4: #6f88a4;

            --border:        rgba(56,173,248,0.16);
            --border-md:     rgba(56,173,248,0.24);
            --border-strong: rgba(56,173,248,0.38);

            --shadow-xs: 0 1px 3px rgba(0,0,0,0.30);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.40);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.45);
            --shadow-xl: 0 20px 56px rgba(0,0,0,0.50);
            --shadow-blue:    0 4px 18px rgba(56,173,248,0.18);
            --shadow-blue-lg: 0 8px 36px rgba(56,173,248,0.28);

            --green:        #10b981;
            --green-bg:     rgba(16,185,129,0.10);
            --green-border: rgba(16,185,129,0.22);
            --amber:        #f59e0b;
            --amber-bg:     rgba(245,158,11,0.10);
            --amber-border: rgba(245,158,11,0.22);
            --red:          #f87171;
            --red-bg:       rgba(248,113,113,0.10);
            --red-border:   rgba(248,113,113,0.22);
        }

        /* ═══════════════════════════
           RESET & BASE
        ═══════════════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--font-sans);
            background: var(--bg-gradient, var(--off-white));
            color: var(--text-1);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            line-height: 1.6;
            transition: background 0.3s var(--ease), color 0.25s var(--ease);
        }
        html[data-theme="dark"] body {
            background: var(--off-white);
        }
        h1,h2,h3,h4,h5,h6 { font-family: var(--font-serif); font-weight: 400; line-height: 1.15; }
        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }
        button { cursor: pointer; font-family: var(--font-sans); }
        input, select, textarea { font-family: var(--font-sans); }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--sky-300); border-radius: 2px; }

        /* ═══════════════════════════
           THEME TOGGLE BUTTON
        ═══════════════════════════ */
        .theme-toggle {
            width: 36px; height: 36px;
            border-radius: var(--r);
            border: 1.5px solid var(--border-md);
            background: var(--surface);
            color: var(--text-2);
            display: inline-flex; align-items: center; justify-content: center;
            cursor: pointer;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: var(--shadow-xs);
            transition: all 0.22s var(--ease);
        }
        .theme-toggle:hover {
            border-color: var(--sky-400);
            color: var(--sky-600);
            background: var(--sky-50);
            transform: rotate(15deg) scale(1.08);
        }
        .theme-toggle .t-moon { display: block; }
        .theme-toggle .t-sun  { display: none; }
        html[data-theme="dark"] .theme-toggle .t-moon { display: none; }
        html[data-theme="dark"] .theme-toggle .t-sun  { display: block; }

        /* Floating theme button (for auth pages) */
        .theme-toggle-float {
            position: fixed; top: 16px; right: 16px; z-index: 999;
        }

        /* ═══════════════════════════
           BUTTONS
        ═══════════════════════════ */
        .btn {
            display: inline-flex; align-items: center; justify-content: center;
            gap: 7px; padding: 9px 18px;
            border-radius: var(--r); font-size: 0.875rem; font-weight: 500;
            border: 1.5px solid transparent;
            transition: all 0.22s var(--ease);
            white-space: nowrap; cursor: pointer; outline: none;
            font-family: var(--font-sans);
        }
        .btn-primary {
            background: var(--sky-600); color: #fff; border-color: var(--sky-600);
            box-shadow: var(--shadow-blue);
        }
        .btn-primary:hover {
            background: var(--sky-700); border-color: var(--sky-700);
            box-shadow: var(--shadow-blue-lg); transform: translateY(-1px);
        }
        .btn-outline {
            background: var(--white); color: var(--text-2); border-color: var(--border-md);
        }
        .btn-outline:hover { border-color: var(--sky-400); color: var(--text-1); background: var(--sky-50); }
        .btn-ghost { background: transparent; color: var(--text-3); border-color: transparent; }
        .btn-ghost:hover { background: var(--surface-muted); color: var(--text-2); }
        .btn-lg { padding: 12px 26px; font-size: 0.95rem; border-radius: var(--r-lg); }
        .btn-sm { padding: 6px 13px; font-size: 0.8rem; border-radius: var(--r-sm); }

        /* ═══════════════════════════
           FORMS
        ═══════════════════════════ */
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 0.8rem; font-weight: 600; color: var(--text-2); }
        .form-input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid var(--border-md);
            border-radius: var(--r);
            background: var(--white); color: var(--text-1);
            font-size: 0.9rem; font-family: var(--font-sans);
            transition: border-color 0.15s, box-shadow 0.15s, background 0.25s; outline: none;
        }
        .form-input::placeholder { color: var(--text-4); }
        .form-input:hover { border-color: var(--sky-300); }
        .form-input:focus { border-color: var(--sky-500); box-shadow: 0 0 0 3px rgba(14,145,232,0.1); }
        html[data-theme="dark"] .form-input { background: var(--surface-muted); }
        .form-error { font-size: 0.775rem; color: var(--red); }
        .form-hint  { font-size: 0.775rem; color: var(--text-3); }

        /* ═══════════════════════════
           BADGES
        ═══════════════════════════ */
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 9px; border-radius: var(--r-pill);
            font-size: 0.7rem; font-weight: 600;
            border: 1px solid transparent;
        }
        .badge-success { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
        .badge-warning { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-border); }
        .badge-danger  { background: var(--red-bg);   color: var(--red);   border-color: var(--red-border); }
        .badge-info    { background: var(--sky-50);   color: var(--sky-700); border-color: var(--sky-200); }
        .badge-neutral { background: var(--surface-muted); color: var(--text-3); border-color: var(--border-md); }

        /* ═══════════════════════════
           CARD & DIVIDER
        ═══════════════════════════ */
        .card {
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--r-lg); box-shadow: var(--shadow-xs);
            transition: background 0.25s, border-color 0.25s;
        }
        hr, .hr { border: none; height: 1px; background: var(--border); margin: 0; }

        /* ═══════════════════════════
           FLASH MESSAGES
        ═══════════════════════════ */
        .flash-container {
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px; max-width: 380px;
        }
        .flash {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 13px 17px; border-radius: var(--r-lg);
            background: var(--white); border: 1px solid var(--border);
            box-shadow: var(--shadow-lg); font-size: 0.875rem; font-weight: 500;
            color: var(--text-1);
            animation: flashIn 0.35s var(--ease-spring) both;
        }
        .flash-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
        .flash.success { border-color: var(--green-border); }
        .flash.success .flash-icon::before { content: '✓'; color: var(--green); }
        .flash.danger  { border-color: var(--red-border); }
        .flash.danger  .flash-icon::before { content: '✕'; color: var(--red); }
        .flash.warning { border-color: var(--amber-border); }
        .flash.warning .flash-icon::before { content: '⚠'; color: var(--amber); }
        .flash.info    { border-color: var(--sky-200); }
        .flash.info    .flash-icon::before { content: 'i'; color: var(--sky-600); font-style: italic; }
        @keyframes flashIn { from{transform:translateX(32px);opacity:0} to{transform:translateX(0);opacity:1} }

        /* ═══════════════════════════
           GLOBAL SIDEBAR DARK THEME
        ═══════════════════════════ */
        html[data-theme="dark"] .sidebar{background:linear-gradient(180deg,#10161f 0%,#141c28 52%,#192536 100%);border-right-color:rgba(124,200,251,0.24);box-shadow:14px 0 42px rgba(0,0,0,0.42)}
        html[data-theme="dark"] .sidebar-brand{border-bottom-color:rgba(255,255,255,0.15)}
        html[data-theme="dark"] .sb-name{color:#f5fbff}
        html[data-theme="dark"] .sb-section-title{color:rgba(218,238,255,0.65)}
        html[data-theme="dark"] .sidebar-link{color:rgba(230,245,255,0.9)}
        html[data-theme="dark"] .sidebar-link:hover{background:rgba(255,255,255,0.10);color:#fff}
        html[data-theme="dark"] .sidebar-link.active{background:linear-gradient(135deg,rgba(56,173,248,0.28),rgba(124,200,251,0.18));box-shadow:inset 0 0 0 1px rgba(255,255,255,0.22)}
        html[data-theme="dark"] .sl-icon{background:rgba(255,255,255,0.07)}
        html[data-theme="dark"] .sidebar-link.active .sl-icon{background:rgba(255,255,255,0.20)}
        html[data-theme="dark"] .sb-user{border-color:rgba(255,255,255,0.15);background:rgba(255,255,255,0.06)}
        html[data-theme="dark"] .sb-avatar{background:linear-gradient(135deg,#7cc8fb,#38adf8);color:#0b3d6a}
        html[data-theme="dark"] .sb-user-name{color:#fff}
        html[data-theme="dark"] .sb-user-role{color:rgba(220,240,255,0.75)}
        html[data-theme="dark"] .sb-footer{border-top-color:rgba(255,255,255,0.15)}
        html[data-theme="dark"] .sb-logout-btn{color:rgba(230,245,255,0.9);background:rgba(0,0,0,0.25);border-color:rgba(255,255,255,0.2)}
        html[data-theme="dark"] .sb-logout-btn:hover{color:#fff;background:rgba(239,68,68,0.22);border-color:rgba(252,165,165,0.5)}
    </style>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/animations.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-container" id="flashContainer">
            {% for category, message in messages %}
            <div class="flash {{ category }}">
                <span class="flash-icon"></span>
                <span>{{ message }}</span>
            </div>
            {% endfor %}
        </div>
        <script>
            (function(){
                var c = document.getElementById('flashContainer');
                if (!c) return;
                setTimeout(function(){
                    c.querySelectorAll('.flash').forEach(function(el, i){
                        setTimeout(function(){
                            el.style.transition = 'opacity 0.3s, transform 0.3s';
                            el.style.opacity = '0';
                            el.style.transform = 'translateX(32px)';
                        }, i * 80);
                    });
                    setTimeout(function(){ c.remove(); }, 4500);
                }, 3200);
            })();
        </script>
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}

    <!-- Global Theme Toggle Script -->
    <script>
        function toggleTheme() {
            var html = document.documentElement;
            var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('rh-theme', next);
        }
    </script>
</body>
</html>
